<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Champion Fusion</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

 
  <div class="overlay"></div>

  <main class="app">
    <h1>CHAMPION FUSION</h1>
    <p>The wheel creates a new League-style champion</p>

    <select id="category">
    <option value="body">BODY</option>
      <option value="head">HEAD</option>
      <option value="head">EYES</option>
      <option value="head">NOSE</option>
      <option value="head">LEGS</option>
    <option value="weapon">WEAPON</option>
      <option value="head">EXTRA</option>
    <option value="theme">THEME</option>
    </select>

    <div class="bg-slideshow">
  <img src= "nbg.png" class="bg-img active">
  <img src="nbg.png" class="bg-img">
  <img src= "nbg.png" class="bg-img">
  <img src= "nbg.png" class="bg-img">
  <img src= "nbg.png" class="bg-img">
</div>

<div class="dark-overlay"></div>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <div class="wheel" id="wheel"></div>
      <div class="center-text" id="centerText">?</div>
    </div>

    <button id="spinBtn">SPIN</button>

    <h2 id="result">Press Spin</h2>

    <section class="build">
  <div><span>BODY</span><strong id="bodyResult">????</strong></div>
       <div><span>HEAD</span><strong id="headResult">????</strong></div>
      <div><span>EYES</span><strong id="eyesResult">????</strong></div>
      <div><span>NOSE</span><strong id="noseResult">????</strong></div>
      <div><span>LEGS</span><strong id="legsResult">????</strong></div>
  <div><span>WEAPON</span><strong id="weaponResult">????</strong></div>
      <div><span>EXTRA</span><strong id="extraResult">????</strong></div>
  <div><span>THEME</span><strong id="themeResult">????</strong></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
